mkdir -p .streamlit
touch .streamlit/secrets.toml

[theme]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false

[server]
enableCORS = false
enableXsrfProtection = false

# Untuk menyembunyikan menu sidebar pages
[client]
showSidebarNavigation = false