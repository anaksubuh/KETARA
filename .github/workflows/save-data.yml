name: Save Data to Database

on:
  issues:
    types: [opened, edited]

jobs:
  save-to-db:
    # Hanya proses issue dengan label 'save-data'
    if: contains(github.event.issue.labels.*.name, 'save-data')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Parse issue and save to database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ambil body issue
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          
          # Baca database.json yang sudah ada
          if [ -f "database.json" ]; then
            cat database.json > current_db.json
          else
            echo '{"daftar_nik_valid":["1111111111111111","2222222222222222","3333333333333333"],"riwayat_penggunaan":{}}' > current_db.json
          fi
          
          # Extract NIK dari title (format: "POLLING: NIK 1234567890123456" atau "ASPIRASI: NIK ...")
          NIK=$(echo "$ISSUE_TITLE" | grep -oE '[0-9]{16}')
          
          # Parse menggunakan Node.js
          node << 'EOF'
          const fs = require('fs');
          
          const db = JSON.parse(fs.readFileSync('current_db.json', 'utf8'));
          const issueBody = process.env.ISSUE_BODY;
          const issueTitle = process.env.ISSUE_TITLE;
          const nik = process.env.NIK;
          const issueNumber = process.env.ISSUE_NUMBER;
          const timestamp = new Date().toISOString();
          
          // Inisialisasi riwayat jika belum ada
          if (!db.riwayat_penggunaan[nik]) {
            db.riwayat_penggunaan[nik] = {
              total: 0,
              lastReset: new Date().getFullYear(),
              history: []
            };
          }
          
          // Reset tahunan
          const currentYear = new Date().getFullYear();
          if (db.riwayat_penggunaan[nik].lastReset !== currentYear) {
            db.riwayat_penggunaan[nik].total = 0;
            db.riwayat_penggunaan[nik].lastReset = currentYear;
          }
          
          // Cek kuota
          if (db.riwayat_penggunaan[nik].total >= 10) {
            console.log('Kuota habis, tidak menyimpan');
            process.exit(0);
          }
          
          // Tentukan tipe
          let type = 'unknown';
          if (issueTitle.includes('POLLING')) type = 'polling';
          if (issueTitle.includes('ASPIRASI')) type = 'aspirasi';
          
          // Simpan ke history
          db.riwayat_penggunaan[nik].history.push({
            type: type,
            issue_number: parseInt(issueNumber),
            timestamp: timestamp,
            raw_body: issueBody
          });
          
          db.riwayat_penggunaan[nik].total += 1;
          
          // Simpan database
          fs.writeFileSync('database.json', JSON.stringify(db, null, 2));
          console.log('✅ Database updated');
          EOF
          
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.json
          git commit -m "Update database from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push
      
      - name: Close issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --comment "✅ Data berhasil disimpan ke database!\\n\\nTerima kasih atas partisipasinya."